<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>祈愿复盘看板</title>
    <link rel="stylesheet" href="./styles.css?v=20260406b" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>祈愿单项目线上复盘看板</h1>
        <p class="subTitle">
          支持纵向（专题历史）与横向（品类分位）对比；数据来自本地构建后的
          <code>data/dashboard-data.json</code>
        </p>
        <p id="dataVersion" class="dataVersion"></p>
      </header>

      <div class="dashboardLayout">
        <aside class="panel topicAside">
          <h2>专题列表</h2>
          <input
            id="topicSearch"
            class="topicSearch"
            type="search"
            placeholder="按专题名称模糊搜索"
            autocomplete="off"
          />

          <div class="topicSection">
            <h3>本周新上线（自然周·周一至今日）</h3>
            <div id="weekTopicList" class="topicList"></div>
          </div>

          <div class="topicSection">
            <h3>全部专题（按最近上线排序）</h3>
            <div id="allTopicList" class="topicList"></div>
          </div>
        </aside>

        <main class="detailMain">
          <p id="loadingHint" class="loadingHint">正在加载数据...</p>

          <section class="panel">
            <div id="projectOverview" class="projectOverview"></div>
            <div id="projectOneLineSummary" class="projectOneLineSummary"></div>
            <div id="kpiGrid" class="kpiGrid"></div>
          </section>

          <section class="panel">
            <h2>宣发触达效率</h2>
            <div id="promoReachPanel"></div>
          </section>

          <section class="panel">
            <h2>纵向对比：当前专题历史祈愿</h2>
            <div id="topicHistoryTable" class="tableWrap"></div>
          </section>

          <section class="panel">
            <h2>横向对比：当前品类表现（P25 / P50 / P75）</h2>
            <div id="categoryCompareTable" class="tableWrap"></div>
          </section>

          <section class="panel">
            <h2>自动复盘摘要</h2>
            <pre id="reviewText" class="reviewText"></pre>
          </section>
        </main>
      </div>
    </div>

    <script src="./app.js?v=20260406b"></script>
  </body>
</html>
