<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>祈愿复盘看板</title>
    <link rel="stylesheet" href="./styles.css?v=20260406a" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>祈愿单项目线上复盘看板</h1>
        <p class="subTitle">
          支持纵向（专题历史）与横向（品类分位）对比；数据来自本地构建后的
          <code>data/dashboard-data.json</code>
        </p>
        <p id="dataVersion" class="dataVersion"></p>
      </header>

      <section class="panel filters">
        <h2>筛选条件</h2>
        <div class="filterGrid">
          <label>
            项目
            <select id="filterProject"></select>
          </label>
          <label>
            专题
            <select id="filterTopic"></select>
          </label>
          <label>
            品类
            <select id="filterCategory"></select>
          </label>
          <label>
            起始日期（>=）
            <input id="filterFrom" type="date" />
          </label>
          <label>
            起始日期（<=）
            <input id="filterTo" type="date" />
          </label>
          <label>
            当前祈愿
            <select id="filterWish"></select>
          </label>
        </div>
      </section>

      <p id="loadingHint" class="loadingHint">正在加载数据...</p>

      <section class="panel">
        <h2>当前祈愿关键资源</h2>
        <div id="kpiGrid" class="kpiGrid"></div>
      </section>

      <section class="panel">
        <h2>纵向对比：当前专题历史祈愿</h2>
        <div id="topicHistoryTable" class="tableWrap"></div>
      </section>

      <section class="panel">
        <h2>横向对比：当前品类表现（P25 / P50 / P75）</h2>
        <div id="categoryCompareTable" class="tableWrap"></div>
      </section>

      <section class="panel">
        <h2>自动复盘摘要</h2>
        <pre id="reviewText" class="reviewText"></pre>
      </section>
    </div>

    <script src="./app.js?v=20260406a"></script>
  </body>
</html>
